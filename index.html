<!DOCTYPE html>
<html>
<head>
    <title>Basic User form</title>
</head>

<body>
 <h1>Registration Form</h1>
 <form>
 <fieldset>
    <legend>Personal Information</legend>
    <label for="name"> Full Name</label>
    <input type="text" id="text" placeholder="enter the username" required><br><br>

    <label for="email">Gmail</label>
    <input type="email" id="email" placeholder="enter the email" required><br><br>

    <label for="Phone number">Number</label>
    <input type="Number" id="Number" placeholder="Enter the Number" required><br><br>

    <label for="Age">Age</label>
    <input type="Age" id="Age" placeholder="enter the age" required><br><br>

 </fieldset>
 <fieldset>
    <legend>Additional Information</legend>
    <label for="Gender">Gender</label>
    <input type="gender" id="gender" placeholder="choose the gender" required><br><br>

    <label for="colour">Favourite Colour</label><br>
    <select id="colour">
        <option value="red">Red</option>
        <option value="Orange">Orange</option>
        <option value="Blue">Blue</option>
        <option value="White">White</option>
    </select><br><br>
        <label for="message">message</label>
        <textarea id="message"></textarea><br><br>
    
 </fieldset>
 <button type="submit">Submit</button>
 </form>

</body>
</html>
